# Prometheus scrape config (FR9). Scrapes the app services' /metrics endpoints on
# the compose network. Extend targets as services expose metrics.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: axiome-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - "gateway:3000"
          - "user-service:3002"
          - "event-service:3003"
          - "organization-service:3004"
          - "biocompute:8000"
