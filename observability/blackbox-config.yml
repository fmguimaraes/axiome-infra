# blackbox_exporter modules (FR12) — HTTPS reachability + TLS-cert-expiry probing.
# probe_ssl_earliest_cert_expiry is emitted automatically for any https_2xx probe;
# see alerts.yml TLSCertExpiringSoon / HTTPSProbeFailed.
modules:
  https_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [] # any 2xx
      method: GET
      tls_config:
        insecure_skip_verify: false
