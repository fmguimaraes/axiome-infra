---
# Ansible playbook for on-prem deployment.
# Use when managing multiple customer hosts or when a customer's ops team
# prefers Ansible over the install.sh shell script.
#
# Usage:
#   ansible-playbook -i inventory.ini site.yml \
#       -e "axiome_mode=connected" \
#       -e "axiome_install_dir=/opt/axiome"

- name: Install Axiome stack
  hosts: axiome
  become: true
  vars:
    axiome_mode: connected         # connected | airgapped
    axiome_install_dir: /opt/axiome
    axiome_images_tar: ""          # required when mode=airgapped
    axiome_env_file: ""            # path on control node to .env file to upload

  tasks:
    - name: Verify mode
      assert:
        that:
          - axiome_mode in ["connected", "airgapped"]
          - (axiome_mode == "connected") or (axiome_images_tar | length > 0)
          - axiome_env_file | length > 0
        fail_msg: "Set axiome_mode (connected/airgapped), axiome_env_file, and axiome_images_tar (airgapped only)."

    - name: Install base packages
      apt:
        name: [ca-certificates, curl, gnupg, lsb-release, unzip, jq, cron, logrotate]
        state: present
        update_cache: yes

    - name: Add Docker apt key
      apt_key:
        url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
        state: present

    - name: Add Docker apt repo
      apt_repository:
        repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker engine + compose plugin
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-buildx-plugin, docker-compose-plugin]
        state: present
        update_cache: yes

    - name: Ensure docker is running
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Create install directory
      file:
        path: "{{ axiome_install_dir }}"
        state: directory
        mode: "0750"
        owner: root
        group: root

    - name: Upload .env file
      copy:
        src: "{{ axiome_env_file }}"
        dest: "{{ axiome_install_dir }}/.env"
        mode: "0600"
        owner: root
        group: root

    - name: Upload docker-compose.yml ({{ axiome_mode }})
      copy:
        src: "../compose/docker-compose.{{ axiome_mode }}.yml"
        dest: "{{ axiome_install_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Upload Caddyfile
      copy:
        src: "../compose/Caddyfile"
        dest: "{{ axiome_install_dir }}/Caddyfile"
        mode: "0644"

    - name: (airgapped) Upload images tarball
      when: axiome_mode == "airgapped"
      copy:
        src: "{{ axiome_images_tar }}"
        dest: "/tmp/axiome-images.tar"
        mode: "0600"

    - name: (airgapped) Load images
      when: axiome_mode == "airgapped"
      command: docker load -i /tmp/axiome-images.tar
      changed_when: true

    - name: (connected) docker compose pull
      when: axiome_mode == "connected"
      command: docker compose -f {{ axiome_install_dir }}/docker-compose.yml pull
      args:
        chdir: "{{ axiome_install_dir }}"
      changed_when: true

    - name: Start docker compose stack
      command: docker compose -f {{ axiome_install_dir }}/docker-compose.yml up -d
      args:
        chdir: "{{ axiome_install_dir }}"
      changed_when: true

    - name: Install systemd service
      template:
        src: axiome.service.j2
        dest: /etc/systemd/system/axiome.service
        mode: "0644"
      notify: reload systemd

    - name: Enable axiome service
      systemd:
        name: axiome.service
        enabled: yes

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes
