# Promtail config for on-prem (FR9 / NFR8). Ships container stdout/stderr (discovered
# via the Docker API, so the json-file driver is kept for `docker logs`) plus host
# bootstrap logs to the local Loki. No secrets/PII in logs (NFR8) — stdout/stderr only.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - replacement: docker
        target_label: job

  - job_name: host
    static_configs:
      - targets: [localhost]
        labels:
          job: host
          __path__: /var/log/axiome-install.log
