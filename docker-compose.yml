services:
  postgres:
    image: postgres:15-alpine
    container_name: axiome-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-axiome}
      POSTGRES_USER: ${POSTGRES_USER:-axiome}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axiome_local_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - axiome-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axiome}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: axiome-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-axiome}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-axiome_local_dev}
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-axiome}
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - axiome-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: axiome-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - axiome-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: axiome-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-axiome}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-axiome_local_dev}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - axiome-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: axiome-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - axiome-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: axiome-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb local/axiome-local-artifacts --ignore-existing;
      mc mb local/axiome-local-uploads --ignore-existing;
      mc mb local/axiome-local-system --ignore-existing;
      mc version enable local/axiome-local-artifacts;
      echo 'Buckets created successfully';
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    networks:
      - axiome-network

  backend:
    image: node:20-alpine
    container_name: axiome-backend
    working_dir: /app
    command: sh -c "apk add --no-cache openssl && npm install && npm run dev"
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-axiome}:${POSTGRES_PASSWORD:-axiome_local_dev}@postgres:5432/${POSTGRES_DB:-axiome}
      USER_DATABASE_URL: postgresql://${POSTGRES_USER:-axiome}:${POSTGRES_PASSWORD:-axiome_local_dev}@postgres:5432/${POSTGRES_DB:-axiome}?schema=user_svc
      ORGANIZATION_DATABASE_URL: postgresql://${POSTGRES_USER:-axiome}:${POSTGRES_PASSWORD:-axiome_local_dev}@postgres:5432/${POSTGRES_DB:-axiome}?schema=organization_svc
      MONGODB_URL: mongodb://${MONGODB_USER:-axiome}:${MONGODB_PASSWORD:-axiome_local_dev}@mongodb:27017/${MONGODB_DB:-axiome}?authSource=admin
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-axiome}:${RABBITMQ_PASSWORD:-axiome_local_dev}@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET_ARTIFACTS: axiome-local-artifacts
      S3_BUCKET_UPLOADS: axiome-local-uploads
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      BIOCOMPUTE_URL: http://biocompute:8000
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-in-production}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@axiome.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin}
      BOOTSTRAP_ADMIN_FIRST_NAME: ${BOOTSTRAP_ADMIN_FIRST_NAME:-Local}
      BOOTSTRAP_ADMIN_LAST_NAME: ${BOOTSTRAP_ADMIN_LAST_NAME:-Admin}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ../axiome-back:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - axiome-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  biocompute:
    build:
      context: ../axiome-bio-compute
      dockerfile: Dockerfile
    container_name: axiome-biocompute
    working_dir: /app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      BIO_COMPUTE_LOG_LEVEL: ${BIOCOMPUTE_LOG_LEVEL:-INFO}
      BIO_COMPUTE_PORT: "8000"
      BIO_COMPUTE_S3_ENDPOINT_URL: http://minio:9000
      BIO_COMPUTE_S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      BIO_COMPUTE_S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      BIO_COMPUTE_S3_BUCKET: axiome-local-artifacts
      BIO_COMPUTE_DASHBOARD_DB_URL: postgresql://${POSTGRES_USER:-axiome}:${POSTGRES_PASSWORD:-axiome_local_dev}@postgres:5432/${POSTGRES_DB:-axiome}
    ports:
      - "${BIOCOMPUTE_PORT:-8000}:8000"
    volumes:
      - ../axiome-bio-compute:/app
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - axiome-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: node:20-alpine
    container_name: axiome-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-3000}/api/v1
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../axiome-front:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - axiome-network

volumes:
  postgres_data:
  mongodb_data:
  minio_data:
  rabbitmq_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  axiome-network:
    driver: bridge
    name: axiome-local
