name: Export deploy credentials
description: |
  Validates and exports AWS credentials into $GITHUB_ENV. Used by terraform-cd
  jobs so terraform can authenticate against both the S3 state backend and the
  AWS resource provider (which use the same env-var conventions:
  AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY).

  Fails fast with a clear ::error:: annotation if either credential is unset,
  rather than letting terraform die mid-init with a generic "no valid
  credential sources" message.

inputs:
  aws_access_key_id:
    description: "AWS access key (required)"
    required: true
  aws_secret_access_key:
    description: "AWS secret key (required)"
    required: true

runs:
  using: composite
  steps:
    - name: Export credentials
      shell: bash
      env:
        IN_AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
        IN_AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
      run: |
        set -euo pipefail
        : "${IN_AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required — configure it as a repo-level Secret on axiome-infra}"
        : "${IN_AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required — configure it as a repo-level Secret on axiome-infra}"
        {
          echo "AWS_ACCESS_KEY_ID=${IN_AWS_ACCESS_KEY_ID}"
          echo "AWS_SECRET_ACCESS_KEY=${IN_AWS_SECRET_ACCESS_KEY}"
        } >> "$GITHUB_ENV"
        echo "AWS credentials exported."
