# Terraform CI — fmt + validate + plan on PRs.
#
# This is the *gate* for infra changes before they land on `main`.
# Once merged, terraform-cd.yml runs the actual apply.

name: terraform-ci

on:
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'modules/**'
      - 'environments/**'
      - 'scripts/**'
      - '.github/workflows/terraform-ci.yml'

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.7'
  TF_IN_AUTOMATION: 'true'

jobs:
  fmt-validate:
    name: fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt -check
        run: terraform fmt -recursive -check -diff

      - name: terraform validate
        run: |
          terraform init -backend=false -input=false
          terraform validate

  plan:
    name: plan ${{ matrix.env }}
    needs: [fmt-validate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, staging, production]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Export provider credentials
        uses: ./.github/actions/export-deploy-credentials
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          neon_api_key: ${{ secrets.NEON_API_KEY }}
          mongodb_atlas_public_key: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
          mongodb_atlas_private_key: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}

      # dev/staging state backends (S3 bucket + DynamoDB lock table) are
      # intentionally torn down to save cost when not actively in use —
      # production is the only environment this repo actually applies to
      # (see terraform-cd.yml). Don't let a paused dev/staging backend
      # block the PR gate; still fail hard on a real production plan error.
      - name: terraform plan (${{ matrix.env }})
        id: plan
        env:
          PROVIDER: ${{ vars.PROVIDER || vars.REGISTRY_PROVIDER || 'aws' }}
        continue-on-error: ${{ matrix.env != 'production' }}
        run: bash scripts/deploy.sh "${{ matrix.env }}" --plan-only

      - name: Warn on non-production plan failure
        if: matrix.env != 'production' && steps.plan.outcome == 'failure'
        run: |
          echo "::warning::terraform plan (${{ matrix.env }}) failed — ${{ matrix.env }} state backend is paused to save cost, so this isn't blocking. Re-run after bootstrap-state.sh ${{ matrix.env }} if you need a real plan here."
