name: Promote — Deploy Approved Version

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (git SHA) to promote"
        required: true
        type: string
      target_environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      run_migrations:
        description: "Run database migrations before deployment"
        required: false
        type: boolean
        default: false

env:
  REGISTRY_ENDPOINT: ${{ secrets.SCW_REGISTRY_ENDPOINT }}

jobs:
  validate:
    name: Validate Image Exists
    runs-on: ubuntu-latest
    steps:
      - name: Login to registry
        run: |
          echo "${{ secrets.SCW_SECRET_KEY }}" | docker login "$REGISTRY_ENDPOINT" -u nologin --password-stdin

      - name: Verify backend image
        run: docker manifest inspect "$REGISTRY_ENDPOINT/backend:${{ inputs.image_tag }}"

      - name: Verify biocompute image
        run: docker manifest inspect "$REGISTRY_ENDPOINT/biocompute:${{ inputs.image_tag }}"

  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [validate]
    if: inputs.run_migrations
    environment: ${{ inputs.target_environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/axiome-back
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run migration:run

  deploy:
    name: Deploy to ${{ inputs.target_environment }}
    runs-on: ubuntu-latest
    needs: [validate, migrate]
    if: always() && needs.validate.result == 'success' && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Install Scaleway CLI
        run: |
          curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh

      - name: Deploy backend
        run: |
          scw container container update \
            ${{ secrets.SCW_BACKEND_CONTAINER_ID }} \
            registry-image="$REGISTRY_ENDPOINT/backend:${{ inputs.image_tag }}" \
            redeploy=true

      - name: Deploy biocompute
        run: |
          scw container container update \
            ${{ secrets.SCW_BIOCOMPUTE_CONTAINER_ID }} \
            registry-image="$REGISTRY_ENDPOINT/biocompute:${{ inputs.image_tag }}" \
            redeploy=true

      - name: Deploy frontend
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository_owner }}/axiome-front.git /tmp/axiome-front
          cd /tmp/axiome-front
          git checkout ${{ inputs.image_tag }} || true
          npm ci && npm run build
          pip install awscli
          aws s3 sync dist/ s3://axiome-${{ inputs.target_environment }}-frontend/ \
            --endpoint-url https://s3.fr-par.scw.cloud \
            --delete

      - name: Health check — Backend
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_URL }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Waiting... (attempt $i/30)"
            sleep 10
          done
          echo "Backend health check failed"
          exit 1

      - name: Health check — Biocompute
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BIOCOMPUTE_URL }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Biocompute health check passed"
              exit 0
            fi
            echo "Waiting... (attempt $i/30)"
            sleep 10
          done
          echo "Biocompute health check failed"
          exit 1

      - name: Record deployment metadata
        run: |
          echo "Deployed version: ${{ inputs.image_tag }}"
          echo "Target environment: ${{ inputs.target_environment }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Triggered by: ${{ github.actor }}"
