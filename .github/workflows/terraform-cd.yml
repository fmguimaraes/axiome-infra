# Terraform CD — terraform plan/apply for the single live environment.
#
# REALITY: there is only ONE real environment — production (the "platform"). The repo
# still scaffolds dev/ and staging/ tfvars, but no dev or staging infrastructure exists
# (no dev/staging state-lock tables), so this pipeline only ever targets production.
#
# Behaviour:
#   push to main (infra paths)  -> terraform PLAN production (read-only; no changes).
#                                  This gives visibility + catches errors without
#                                  touching the single live platform.
#   workflow_dispatch           -> terraform APPLY production (set plan_only=true to
#                                  only plan). This is the deliberate, manual deploy.
#
# Why apply is never automatic on push: production is the only environment and hosts
# live data; an unreviewed apply can replace the VM or mutate stateful resources.

name: terraform-cd

on:
  push:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'modules/**'
      - 'environments/**'
      - 'providers/**'
      - 'scripts/**'
      - '.github/workflows/terraform-cd.yml'
      - '.github/actions/export-deploy-credentials/**'
  workflow_dispatch:
    inputs:
      plan_only:
        description: 'Plan only (do not apply)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # for tagging prod releases

env:
  TF_VERSION: '1.7'
  TF_IN_AUTOMATION: 'true'

jobs:
  deploy-production:
    name: Production (the only live environment — "platform")
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Export provider credentials
        uses: ./.github/actions/export-deploy-credentials
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          neon_api_key: ${{ secrets.NEON_API_KEY }}
          mongodb_atlas_public_key: ${{ secrets.MONGODB_ATLAS_PUBLIC_KEY }}
          mongodb_atlas_private_key: ${{ secrets.MONGODB_ATLAS_PRIVATE_KEY }}

      - name: Deploy production
        env:
          PROVIDER: ${{ vars.PROVIDER || vars.REGISTRY_PROVIDER || 'aws' }}
        run: |
          # Push = plan only (never auto-apply to the single live platform).
          # Apply only on a manual workflow_dispatch with plan_only=false.
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.plan_only }}" == "true" ]]; then
            bash scripts/deploy.sh production --plan-only
          else
            bash scripts/deploy.sh production
          fi

      - name: Tag release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.plan_only != true }}
        run: |
          TAG="prod-$(date -u +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD)"
          git tag -a "$TAG" -m "Prod deploy $(date -u '+%Y-%m-%d %H:%M UTC') — run ${{ github.run_id }}"
          git push origin "$TAG"
