name: Secrets Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-secrets:
    name: Check for Plaintext Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for common secret patterns
        run: |
          PATTERNS=(
            'password\s*=\s*["\x27][^"\x27]+["\x27]'
            'secret\s*=\s*["\x27][^"\x27]+["\x27]'
            'api_key\s*=\s*["\x27][^"\x27]+["\x27]'
            'token\s*=\s*["\x27][^"\x27]+["\x27]'
            'PRIVATE.KEY'
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -rniE "$pattern" --include="*.tf" --include="*.tfvars" --include="*.yml" --include="*.yaml" \
               --exclude-dir=".github" --exclude=".env.example" . 2>/dev/null; then
              echo "WARNING: Potential secret found matching pattern: $pattern"
              FOUND=1
            fi
          done

          # Check for .env files that shouldn't be committed
          if git ls-files | grep -E '\.env\.local$|\.env\.production$|\.env\.staging$'; then
            echo "ERROR: Environment file with secrets found in tracked files"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "Secrets check failed — review findings above"
            exit 1
          fi
          echo "No plaintext secrets detected"
