# Auto-promote a service image to dev when a service repo publishes a new image.
#
# Triggered by `repository_dispatch: image-published` emitted from
# axiome-{back,front,bio-compute} via reusable-build.yml.
#
# This workflow only updates environments/dev/images.tfvars and pushes the commit.
# That commit then triggers terraform-cd.yml -> terraform apply dev.

name: dev-auto-promote

on:
  repository_dispatch:
    types: [image-published]

permissions:
  contents: read

jobs:
  update-dev:
    name: Update dev — ${{ github.event.client_payload.service }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # PAT so the resulting commit triggers terraform-cd.yml.
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Update ${{ github.event.client_payload.service }} in dev
        run: |
          bash scripts/update-manifest.sh \
            "${{ github.event.client_payload.service }}" \
            dev \
            "${{ github.event.client_payload.image_tag }}"
