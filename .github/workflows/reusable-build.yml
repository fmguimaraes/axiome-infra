name: Reusable — Build, Push & Notify

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service identifier (backend, biocompute, frontend)"
        required: true
        type: string

jobs:
  build-and-push:
    name: Build & Push — ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      registry_url: ${{ steps.registry.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=$(echo '${{ github.sha }}' | cut -c1-8)" >> "$GITHUB_OUTPUT"

      - name: Debug context
        env:
          REGISTRY_PROVIDER: ${{ secrets.REGISTRY_PROVIDER }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SCW_REGISTRY_ENDPOINT: ${{ secrets.SCW_REGISTRY_ENDPOINT }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          VAR_REGISTRY_PROVIDER: ${{ vars.REGISTRY_PROVIDER }}
          VAR_AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -u
          probe() {
            local name="$1" value="${2-}"
            if [[ -z "${value}" ]]; then
              printf '  %-26s EMPTY\n' "${name}"
            else
              printf '  %-26s set (len=%d)\n' "${name}" "${#value}"
            fi
          }
          echo "::group::Workflow context"
          echo "  service_name:        ${{ inputs.service_name }}"
          echo "  event_name:          ${{ github.event_name }}"
          echo "  ref:                 ${{ github.ref }}"
          echo "  sha:                 ${{ github.sha }}"
          echo "  repository:          ${{ github.repository }}"
          echo "  workflow_sha:        ${{ github.workflow_sha }}"
          echo "  reusable workflow:   axiome-infra ($(git -C "${GITHUB_WORKSPACE}" log -1 --format='%H' 2>/dev/null || echo n/a))"
          echo "::endgroup::"

          echo "::group::Secret presence (values masked by GH; we only print length)"
          probe "secrets.REGISTRY_PROVIDER" "${REGISTRY_PROVIDER:-}"
          probe "secrets.AWS_REGION"        "${AWS_REGION:-}"
          probe "secrets.AWS_ACCOUNT_ID"    "${AWS_ACCOUNT_ID:-}"
          probe "secrets.AWS_ACCESS_KEY_ID" "${AWS_ACCESS_KEY_ID:-}"
          probe "secrets.AWS_SECRET_ACCESS_KEY" "${AWS_SECRET_ACCESS_KEY:-}"
          probe "secrets.SCW_REGISTRY_ENDPOINT" "${SCW_REGISTRY_ENDPOINT:-}"
          probe "secrets.SCW_SECRET_KEY"    "${SCW_SECRET_KEY:-}"
          echo "::endgroup::"

          echo "::group::Variable presence (vars.* context, separate from secrets.*)"
          probe "vars.REGISTRY_PROVIDER" "${VAR_REGISTRY_PROVIDER:-}"
          probe "vars.AWS_REGION"        "${VAR_AWS_REGION:-}"
          echo "::endgroup::"

          echo "::group::Non-sensitive values (only safe-to-print)"
          echo "  secrets.REGISTRY_PROVIDER literal: '${REGISTRY_PROVIDER:-}'"
          echo "  secrets.AWS_REGION literal:        '${AWS_REGION:-}'"
          echo "  vars.REGISTRY_PROVIDER literal:    '${VAR_REGISTRY_PROVIDER:-}'"
          echo "  vars.AWS_REGION literal:           '${VAR_AWS_REGION:-}'"
          echo "::endgroup::"

          echo "::group::Tooling"
          echo "  docker:  $(docker --version 2>&1 || true)"
          echo "  aws:     $(aws --version 2>&1 || true)"
          echo "  bash:    ${BASH_VERSION}"
          echo "::endgroup::"

      - name: Resolve registry URL
        id: registry
        env:
          REGISTRY_PROVIDER: ${{ vars.REGISTRY_PROVIDER || secrets.REGISTRY_PROVIDER }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
          SCW_REGISTRY_ENDPOINT: ${{ vars.SCW_REGISTRY_ENDPOINT || secrets.SCW_REGISTRY_ENDPOINT }}
        run: |
          set -euo pipefail
          case "${REGISTRY_PROVIDER:-}" in
            aws)
              : "${AWS_ACCOUNT_ID:?AWS_ACCOUNT_ID (secret) is required when REGISTRY_PROVIDER=aws}"
              : "${AWS_REGION:?AWS_REGION (var or secret) is required when REGISTRY_PROVIDER=aws}"
              url="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
              ;;
            scaleway)
              : "${SCW_REGISTRY_ENDPOINT:?SCW_REGISTRY_ENDPOINT (var or secret) is required when REGISTRY_PROVIDER=scaleway}"
              url="${SCW_REGISTRY_ENDPOINT}"
              ;;
            "")
              echo "::error::REGISTRY_PROVIDER is not set. Configure it as 'aws' or 'scaleway' in repo-level vars or secrets." >&2
              exit 1
              ;;
            *)
              echo "::error::Unknown REGISTRY_PROVIDER='${REGISTRY_PROVIDER}'. Expected 'aws' or 'scaleway'." >&2
              exit 1
              ;;
          esac
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Login to registry
        env:
          REGISTRY_PROVIDER: ${{ vars.REGISTRY_PROVIDER || secrets.REGISTRY_PROVIDER }}
          REGISTRY_URL: ${{ steps.registry.outputs.url }}
          AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: |
          set -euo pipefail
          case "${REGISTRY_PROVIDER}" in
            aws)
              : "${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID (secret) is required when REGISTRY_PROVIDER=aws}"
              : "${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY (secret) is required when REGISTRY_PROVIDER=aws}"
              aws ecr get-login-password --region "${AWS_REGION}" \
                | docker login --username AWS --password-stdin "${REGISTRY_URL}"
              ;;
            scaleway)
              : "${SCW_SECRET_KEY:?SCW_SECRET_KEY (secret) is required when REGISTRY_PROVIDER=scaleway}"
              printf '%s' "${SCW_SECRET_KEY}" \
                | docker login "${REGISTRY_URL}" -u nologin --password-stdin
              ;;
          esac

      - name: Build image
        run: |
          REGISTRY="${{ steps.registry.outputs.url }}"
          SERVICE="${{ inputs.service_name }}"
          TAG="${{ steps.meta.outputs.tag }}"
          docker build \
            -t "${REGISTRY}/${SERVICE}:${TAG}" \
            -t "${REGISTRY}/${SERVICE}:latest" \
            .

      - name: Push image
        run: |
          REGISTRY="${{ steps.registry.outputs.url }}"
          SERVICE="${{ inputs.service_name }}"
          TAG="${{ steps.meta.outputs.tag }}"
          docker push "${REGISTRY}/${SERVICE}:${TAG}"
          docker push "${REGISTRY}/${SERVICE}:latest"

  notify-infra:
    name: Notify Infra
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Trigger infra repository_dispatch
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/${{ github.repository_owner }}/axiome-infra/dispatches" \
            -d '{
              "event_type": "image-published",
              "client_payload": {
                "service": "${{ inputs.service_name }}",
                "image_tag": "${{ needs.build-and-push.outputs.image_tag }}",
                "repo": "${{ github.repository }}",
                "sha": "${{ github.sha }}"
              }
            }'
