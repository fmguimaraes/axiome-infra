name: Reusable — Build, Push & Notify

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service identifier (backend, biocompute, frontend)"
        required: true
        type: string

jobs:
  build-and-push:
    name: Build & Push — ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      registry_url: ${{ steps.registry.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=$(echo '${{ github.sha }}' | cut -c1-8)" >> "$GITHUB_OUTPUT"

      - name: Resolve registry URL
        id: registry
        run: |
          case "${{ secrets.REGISTRY_PROVIDER }}" in
            aws)
              echo "url=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com" >> "$GITHUB_OUTPUT"
              ;;
            scaleway|*)
              echo "url=${{ secrets.SCW_REGISTRY_ENDPOINT }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Login to registry
        run: |
          case "${{ secrets.REGISTRY_PROVIDER }}" in
            aws)
              aws ecr get-login-password --region "${{ secrets.AWS_REGION }}" | \
                docker login --username AWS --password-stdin "${{ steps.registry.outputs.url }}"
              ;;
            scaleway|*)
              echo "${{ secrets.SCW_SECRET_KEY }}" | \
                docker login "${{ steps.registry.outputs.url }}" -u nologin --password-stdin
              ;;
          esac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build image
        run: |
          REGISTRY="${{ steps.registry.outputs.url }}"
          SERVICE="${{ inputs.service_name }}"
          TAG="${{ steps.meta.outputs.tag }}"
          docker build \
            -t "${REGISTRY}/${SERVICE}:${TAG}" \
            -t "${REGISTRY}/${SERVICE}:latest" \
            .

      - name: Push image
        run: |
          REGISTRY="${{ steps.registry.outputs.url }}"
          SERVICE="${{ inputs.service_name }}"
          TAG="${{ steps.meta.outputs.tag }}"
          docker push "${REGISTRY}/${SERVICE}:${TAG}"
          docker push "${REGISTRY}/${SERVICE}:latest"

  notify-infra:
    name: Notify Infra
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Trigger infra repository_dispatch
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/${{ github.repository_owner }}/axiome-infra/dispatches" \
            -d '{
              "event_type": "image-published",
              "client_payload": {
                "service": "${{ inputs.service_name }}",
                "image_tag": "${{ needs.build-and-push.outputs.image_tag }}",
                "repo": "${{ github.repository }}",
                "sha": "${{ github.sha }}"
              }
            }'
