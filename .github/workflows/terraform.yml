name: Terraform — Plan & Apply

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.tfvars"
      - "environments/**"
      - "modules/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply

env:
  TF_VAR_environment: ${{ inputs.environment || 'dev' }}

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    env:
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        run: terraform init -backend-config=environments/${{ inputs.environment || 'dev' }}/backend.hcl

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file=environments/${{ inputs.environment || 'dev' }}/terraform.tfvars -no-color
        continue-on-error: ${{ github.event_name == 'pull_request' }}

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [plan]
    if: inputs.action == 'apply'
    environment: ${{ inputs.environment }}
    env:
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        run: terraform init -backend-config=environments/${{ inputs.environment }}/backend.hcl

      - name: Terraform Apply
        run: terraform apply -var-file=environments/${{ inputs.environment }}/terraform.tfvars -auto-approve
