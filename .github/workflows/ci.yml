name: CI — Build, Test & Deploy to Dev

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY_ENDPOINT: ${{ secrets.SCW_REGISTRY_ENDPOINT }}
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ../axiome-back
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/axiome-back
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm test

  test-biocompute:
    name: Test Biocompute
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/axiome-biocompute
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt
      - run: pytest

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/axiome-front
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-biocompute, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Scaleway Registry
        run: |
          echo "${{ secrets.SCW_SECRET_KEY }}" | docker login "$REGISTRY_ENDPOINT" -u nologin --password-stdin

      - name: Checkout and build backend
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository_owner }}/axiome-back.git /tmp/axiome-back
          docker build -t "$REGISTRY_ENDPOINT/backend:${{ steps.meta.outputs.tag }}" \
                       -t "$REGISTRY_ENDPOINT/backend:latest" \
                       /tmp/axiome-back
          docker push "$REGISTRY_ENDPOINT/backend:${{ steps.meta.outputs.tag }}"
          docker push "$REGISTRY_ENDPOINT/backend:latest"

      - name: Checkout and build biocompute
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository_owner }}/axiome-biocompute.git /tmp/axiome-biocompute
          docker build -t "$REGISTRY_ENDPOINT/biocompute:${{ steps.meta.outputs.tag }}" \
                       -t "$REGISTRY_ENDPOINT/biocompute:latest" \
                       /tmp/axiome-biocompute
          docker push "$REGISTRY_ENDPOINT/biocompute:${{ steps.meta.outputs.tag }}"
          docker push "$REGISTRY_ENDPOINT/biocompute:latest"

      - name: Checkout and build frontend
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository_owner }}/axiome-front.git /tmp/axiome-front
          cd /tmp/axiome-front
          npm ci
          npm run build
          # Upload to S3-compatible object storage (Scaleway)
          pip install awscli
          aws s3 sync dist/ s3://axiome-dev-frontend/ \
            --endpoint-url https://s3.fr-par.scw.cloud \
            --delete

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Install Scaleway CLI
        run: |
          curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh

      - name: Deploy backend container
        run: |
          scw container container update \
            ${{ secrets.SCW_BACKEND_CONTAINER_ID }} \
            registry-image="$REGISTRY_ENDPOINT/backend:${{ needs.build-and-push.outputs.image_tag }}" \
            redeploy=true

      - name: Deploy biocompute container
        run: |
          scw container container update \
            ${{ secrets.SCW_BIOCOMPUTE_CONTAINER_ID }} \
            registry-image="$REGISTRY_ENDPOINT/biocompute:${{ needs.build-and-push.outputs.image_tag }}" \
            redeploy=true

      - name: Health check — Backend
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_URL }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Waiting for backend... (attempt $i/30)"
            sleep 10
          done
          echo "Backend health check failed"
          exit 1

      - name: Health check — Biocompute
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BIOCOMPUTE_URL }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Biocompute health check passed"
              exit 0
            fi
            echo "Waiting for biocompute... (attempt $i/30)"
            sleep 10
          done
          echo "Biocompute health check failed"
          exit 1
