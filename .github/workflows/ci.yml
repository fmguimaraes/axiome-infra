name: Receive — Update Dev Manifest

on:
  repository_dispatch:
    types: [image-published]

jobs:
  update-dev:
    name: Update Dev — ${{ github.event.client_payload.service }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Update ${{ github.event.client_payload.service }} in dev
        run: |
          bash scripts/update-manifest.sh \
            "${{ github.event.client_payload.service }}" \
            dev \
            "${{ github.event.client_payload.image_tag }}"
