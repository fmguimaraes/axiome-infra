name: CI — Build, Test & Publish Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY_ENDPOINT: ${{ secrets.SCW_REGISTRY_ENDPOINT }}

jobs:
  # ──────────────────────────────────────────────
  # 1. Test each service independently
  # ──────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/axiome-back
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit

  test-biocompute:
    name: Test Biocompute
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/axiome-bio-compute
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install uv && uv pip install --system .
      - run: pytest

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/axiome-front
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit

  # ──────────────────────────────────────────────
  # 2. Compute shared image tag
  # ──────────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Compute image tag from SHA
        id: meta
        run: echo "tag=$(echo '${{ github.sha }}' | cut -c1-8)" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # 3. Build & push each service independently
  # ──────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [test-backend, prepare]
    steps:
      - uses: actions/checkout@v4
      - name: Build and push backend image
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: |
          bash scripts/build-and-push.sh backend \
            "$REGISTRY_ENDPOINT" "${{ needs.prepare.outputs.image_tag }}" \
            "${{ secrets.GH_PAT }}" "${{ github.repository_owner }}"

  build-biocompute:
    name: Build Biocompute
    runs-on: ubuntu-latest
    needs: [test-biocompute, prepare]
    steps:
      - uses: actions/checkout@v4
      - name: Build and push biocompute image
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: |
          bash scripts/build-and-push.sh biocompute \
            "$REGISTRY_ENDPOINT" "${{ needs.prepare.outputs.image_tag }}" \
            "${{ secrets.GH_PAT }}" "${{ github.repository_owner }}"

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test-frontend, prepare]
    steps:
      - uses: actions/checkout@v4
      - name: Build and push frontend image
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: |
          bash scripts/build-and-push.sh frontend \
            "$REGISTRY_ENDPOINT" "${{ needs.prepare.outputs.image_tag }}" \
            "${{ secrets.GH_PAT }}" "${{ github.repository_owner }}"

  # ──────────────────────────────────────────────
  # 4. Update dev manifest per service (GitOps)
  #    Serialized to avoid git push conflicts
  # ──────────────────────────────────────────────
  update-dev-backend:
    name: Update Dev — Backend
    runs-on: ubuntu-latest
    needs: [build-backend, prepare]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - run: bash scripts/update-manifest.sh backend dev "${{ needs.prepare.outputs.image_tag }}"

  update-dev-biocompute:
    name: Update Dev — Biocompute
    runs-on: ubuntu-latest
    needs: [build-biocompute, prepare, update-dev-backend]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - name: Pull latest before update
        run: git pull origin main
      - run: bash scripts/update-manifest.sh biocompute dev "${{ needs.prepare.outputs.image_tag }}"

  update-dev-frontend:
    name: Update Dev — Frontend
    runs-on: ubuntu-latest
    needs: [build-frontend, prepare, update-dev-biocompute]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - name: Pull latest before update
        run: git pull origin main
      - run: bash scripts/update-manifest.sh frontend dev "${{ needs.prepare.outputs.image_tag }}"
